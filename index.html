<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Car Wash Portal</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Background colors updated to be slightly darker */
            --bg-color: #050608;
            --bg-darker: #010203;
            --bg-lighter: #0c0e12;
            
            --card-bg: rgba(10, 12, 16, 0.75);
            --border-glow: rgba(0, 240, 255, 0.15);
            
            /* Neon Color Palettes */
            --whatsapp-neon: #00ff88;
            --whatsapp-glow: rgba(0, 255, 136, 0.4);
            
            --facebook-neon: #0084ff;
            --facebook-glow: rgba(0, 132, 255, 0.4);
            
            --tiktok-neon: #ff0055;
            --tiktok-glow: rgba(255, 0, 85, 0.4);
            
            --directions-neon: #b900ff;
            --directions-glow: rgba(185, 0, 255, 0.4);
            
            --phone-neon: #00ffff;
            --phone-glow: rgba(0, 255, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            /* Radial background gradient centered on the logo, sweeping from very dark charcoal to solid black */
            background-image: 
                radial-gradient(circle at 50% 25%, var(--bg-lighter) 0%, var(--bg-color) 60%, var(--bg-darker) 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient floating bubbles container */
        .bubble-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        /* Individual bubble physics and style */
        .bubble {
            position: absolute;
            bottom: -50px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(0, 240, 255, 0.3) 0%, rgba(185, 0, 255, 0.08) 60%, rgba(255, 255, 255, 0.4) 100%);
            box-shadow: 
                0 0 12px rgba(0, 240, 255, 0.2), 
                inset 0 0 8px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            opacity: 0.6;
            animation: driftUp var(--speed) linear infinite, sway var(--sway-speed) ease-in-out infinite alternate;
        }

        @keyframes driftUp {
            0% {
                transform: translateY(10vh);
                opacity: 0;
            }
            10% {
                opacity: var(--max-opacity);
            }
            90% {
                opacity: var(--max-opacity);
            }
            100% {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        @keyframes sway {
            0% {
                margin-left: 0px;
            }
            100% {
                margin-left: var(--sway-amount);
            }
        }

        /* Mobile Container Device Frame simulation on desktop, seamless on mobile */
        .app-container {
            width: 100%;
            max-width: 440px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 50px 24px 120px 24px;
            z-index: 10;
            position: relative;
            background: transparent; /* Transparent background for a completely seamless integration */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.02);
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        /* Logo area and container */
        .logo-header {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
            perspective: 1000px;
        }

        .logo-glow-wrapper {
            position: relative;
            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;
            transition: transform 0.5s ease;
            display: inline-block;
        }

        .logo-glow-wrapper:hover {
            transform: scale(1.03) rotateY(2deg);
        }

        /* Logo size increased by 20% relative to 429px (max-width updated to 515px) */
        .logo-img {
            max-width: 515px;
            width: 100%;
            height: auto;
            display: block;
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
        }

        /* Tiny flash effect on the car's front headlight */
        .headlight-flash {
            position: absolute;
            top: 51.5%;
            left: 70%;
            width: 6px;
            height: 6px;
            background-color: #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 
                0 0 10px #ffffff,
                0 0 20px #00ffff,
                0 0 35px #00ffff;
            animation: sparkle-flash 2s infinite ease-in-out;
            pointer-events: none;
            z-index: 15;
        }

        /* Cross flare lines */
        .headlight-flash::before,
        .headlight-flash::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            background-color: #ffffff;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px #00ffff;
        }

        .headlight-flash::before {
            width: 18px;
            height: 1.5px;
        }

        .headlight-flash::after {
            width: 1.5px;
            height: 18px;
        }

        @keyframes sparkle-flash {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.3) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.25) rotate(90deg);
                opacity: 1;
            }
        }

        /* Main action portal links stack */
        .links-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 32px;
            flex-grow: 1;
            justify-content: center;
            max-width: 350px;
            margin-bottom: 40px;
        }

        /* Base Neon Button Style */
        .neon-btn {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 16px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 1px;
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Glass highlight shimmer */
        .neon-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transition: 0.5s;
        }

        .neon-btn:hover::after {
            left: 100%;
            transition: 0.8s ease-in-out;
        }

        /* Button specific colors, glows & transitions */
        .btn-whatsapp {
            --neon-color: var(--whatsapp-neon);
            --glow-color: var(--whatsapp-glow);
        }
        
        .btn-facebook {
            --neon-color: var(--facebook-neon);
            --glow-color: var(--facebook-glow);
        }
        
        .btn-tiktok {
            --neon-color: var(--tiktok-neon);
            --glow-color: var(--tiktok-glow);
        }
        
        .btn-directions {
            --neon-color: var(--directions-neon);
            --glow-color: var(--directions-glow);
        }

        .neon-btn:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: var(--neon-color);
            box-shadow: 
                0 0 10px rgba(0, 0, 0, 0.5),
                0 0 15px var(--glow-color),
                inset 0 0 5px rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        /* Icon Container styling */
        .btn-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 18px;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            color: var(--neon-color);
        }

        .neon-btn:hover .btn-icon {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--neon-color);
            box-shadow: 0 0 8px var(--glow-color);
            transform: rotate(-5deg) scale(1.1);
        }

        .btn-text-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .btn-title {
            font-size: 15px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-subtitle {
            font-size: 10px;
            color: #8b9bb4;
            letter-spacing: 0.5px;
            margin-top: 2px;
            font-weight: 400;
        }

        .neon-btn:hover .btn-subtitle {
            color: #ffffff;
            opacity: 0.8;
        }

        /* Arrow indicator on right */
        .btn-arrow {
            margin-left: auto;
            opacity: 0.3;
            transition: all 0.3s ease;
            color: var(--neon-color);
        }

        .neon-btn:hover .btn-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* Pulsing Quick Call FAB (Phone Button) - Centered, 25% bigger (75px), flashing more often (1.1s pulse) */
        .phone-fab {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: #0d1117;
            border: 2px solid var(--phone-neon);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--phone-neon);
            box-shadow: 
                0 0 25px rgba(0, 0, 0, 0.6),
                0 0 20px var(--phone-glow);
            text-decoration: none;
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .phone-fab::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--phone-neon);
            animation: pulse-ring 1.1s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
            opacity: 0.8;
            z-index: -1;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
            }
            70%, 100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }

        .phone-fab:hover {
            transform: translateX(-50%) scale(1.1);
            background: var(--phone-neon);
            color: #07080b;
            box-shadow: 
                0 0 35px var(--phone-glow),
                0 0 15px rgba(0, 255, 255, 0.9);
        }

        .phone-fab svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .phone-fab:hover svg {
            transform: rotate(15deg);
        }

        /* Media queries for larger layout previews */
        @media (min-width: 440px) {
            body {
                background-color: #030406;
            }
            .app-container {
                min-height: 800px;
                height: 90vh;
                border-radius: 36px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                box-shadow: 
                    0 25px 50px -12px rgba(0, 0, 0, 0.75),
                    0 0 30px rgba(0, 240, 255, 0.03);
                margin: 20px 0;
            }
            .phone-fab {
                position: absolute;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>
<body>

    <!-- Bubbles Ambient Animation Layer -->
    <div class="bubble-container" id="bubble-container"></div>

    <!-- Main Mobile Frame Container -->
    <div class="app-container">
        
        <!-- Center Logo Area with headlight flash overlay -->
        <header class="logo-header">
            <div class="logo-glow-wrapper">
                <img src="logo.png" alt="Prestige Car Wash Logo" class="logo-img" onerror="this.src='https://placehold.co/400x200/0d1117/00f0ff?text=PRESTIGE+CAR+WASH'">
                <div class="headlight-flash"></div>
            </div>
        </header>

        <!-- Links Stack -->
        <main class="links-stack">
            
            <!-- WhatsApp -->
            <a href="https://wa.me/35799000000?text=Hello!%20I%20would%20like%20to%20book%20a%20Signature%20Wash." target="_blank" class="neon-btn btn-whatsapp">
                <div class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                </div>
                <div class="btn-text-wrapper">
                    <span class="btn-title">WhatsApp Booking</span>
                    <span class="btn-subtitle">Message or schedule a visit</span>
                </div>
                <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/share/17uwaXnAcH/" target="_blank" class="neon-btn btn-facebook">
                <div class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                    </svg>
                </div>
                <div class="btn-text-wrapper">
                    <span class="btn-title">Facebook Community</span>
                    <span class="btn-subtitle">Follow updates & photos</span>
                </div>
                <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@yourusername" target="_blank" class="neon-btn btn-tiktok">
                <div class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
                    </svg>
                </div>
                <div class="btn-text-wrapper">
                    <span class="btn-title">TikTok Showcase</span>
                    <span class="btn-subtitle">See detailing in action</span>
                </div>
                <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

            <!-- Get Directions -->
            <a href="https://maps.app.goo.gl/XsexdiuR1DEmHRUa8" target="_blank" class="neon-btn btn-directions">
                <div class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                    </svg>
                </div>
                <div class="btn-text-wrapper">
                    <span class="btn-title">Get Directions</span>
                    <span class="btn-subtitle">Open in Google Maps</span>
                </div>
                <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

        </main>

        <!-- Floating Phone Action FAB - Centered, 25% bigger (75px) -->
        <a href="tel:+35799000000" class="phone-fab" title="Call Now">
            <svg viewBox="0 0 24 24">
                <path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z" />
            </svg>
        </a>

    </div>

    <!-- Bubble physics JS -->
    <script>
        const container = document.getElementById('bubble-container');
        const bubblePoolSize = 25; // max active bubbles

        function createBubble(isInitial = false) {
            if (container.children.length >= bubblePoolSize) return;

            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            
            // Random styling parameters
            const size = Math.random() * 45 + 10; // 10px to 55px
            const left = Math.random() * 100; // 0% to 100%
            const maxOpacity = Math.random() * 0.4 + 0.2; // 0.2 to 0.6
            const speed = Math.random() * 10 + 8; // 8s to 18s
            const swaySpeed = Math.random() * 4 + 3; // 3s to 7s
            const swayAmount = (Math.random() * 50 + 20) * (Math.random() > 0.5 ? 1 : -1); // 20px to 70px sway

            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${left}%`;
            
            // Inline physics variables
            bubble.style.setProperty('--speed', `${speed}s`);
            bubble.style.setProperty('--sway-speed', `${swaySpeed}s`);
            bubble.style.setProperty('--sway-amount', `${swayAmount}px`);
            bubble.style.setProperty('--max-opacity', maxOpacity);

            // Seed initial bubbles across random heights so they aren't all spawning from bottom at once
            if (isInitial) {
                const initialDelay = Math.random() * -speed;
                bubble.style.animationDelay = `${initialDelay}s, 0s`;
            } else {
                bubble.style.animationDelay = `0s, 0s`;
            }

            container.appendChild(bubble);

            // Remove bubble once vertical animation finishes
            setTimeout(() => {
                bubble.remove();
            }, speed * 1000);
        }

        // Initialize pool of floating bubbles
        for (let i = 0; i < bubblePoolSize; i++) {
            createBubble(true);
        }

        // Spawn a new bubble every 400ms to maintain density
        setInterval(() => {
            createBubble(false);
        }, 400);
    </script>
</body>
</html>
